<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Admin · pr1meM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg0: #0a0a0a;   /* app background — deep black */
        --bg1: #111111;   /* header, sidebar */
        --bg2: #1a1a1a;   /* cards, inputs */
        --bd:  #2a2a2a;   /* borders — barely visible */
        --bd2: #3a3a3a;   /* borders on hover/focus */
        --tx:  #f0f0f0;   /* primary text */
        --tx2: #888888;   /* secondary text */
        --ac:  #4a9eff;   /* single accent — used sparingly */
        --ac-dim: rgba(74, 158, 255, 0.15);
        --re:  #e05d54;   /* danger — muted */
        --sans: 'Inter', system-ui, -apple-system, sans-serif;
        --mono: 'JetBrains Mono', ui-monospace, monospace;
      }

      /* ── Base ── */
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        margin: 0;
        background: var(--bg0) !important;
        color: var(--tx) !important;
        font-family: var(--sans) !important;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      #nc-root {
        background: var(--bg0) !important;
        color: var(--tx) !important;
        font-family: var(--sans) !important;
      }
      #nc-root * { font-family: inherit; }

      /* ── Typography ── */
      #nc-root h1, #nc-root h2, #nc-root h3,
      #nc-root h4, #nc-root h5, #nc-root h6 {
        color: var(--tx) !important;
        font-weight: 600 !important;
        letter-spacing: -0.015em !important;
      }
      #nc-root p, #nc-root span, #nc-root li,
      #nc-root td, #nc-root th { color: var(--tx) !important; }
      #nc-root a { color: var(--ac) !important; text-decoration: none !important; }
      #nc-root a:hover { text-decoration: underline !important; }
      #nc-root ::selection { background: var(--ac-dim); }

      /* ── Surfaces ── */
      #nc-root nav {
        background: var(--bg1) !important;
        border-right: 1px solid var(--bd) !important;
        box-shadow: none !important;
      }
      #nc-root header {
        background: var(--bg1) !important;
        border-bottom: 1px solid var(--bd) !important;
        box-shadow: none !important;
      }
      #nc-root aside {
        background: var(--bg1) !important;
        border-color: var(--bd) !important;
      }
      #nc-root main { background: var(--bg0) !important; }

      /* ── Kill white/light inline backgrounds ── */
      #nc-root [style*="background-color: rgb(255, 255, 255)"],
      #nc-root [style*="background-color: white"],
      #nc-root [style*="background: white"],
      #nc-root [style*="background: rgb(255, 255, 255)"] {
        background-color: var(--bg2) !important;
      }
      #nc-root [style*="background-color: rgb(223"] { background-color: var(--bg2) !important; }
      #nc-root [style*="background-color: rgb(245"] { background-color: var(--bg1) !important; }
      #nc-root [style*="background-color: rgb(249"] { background-color: var(--bg1) !important; }

      /* ── Cards & panels ── */
      #nc-root [class*="Card"],
      #nc-root [class*="card"],
      #nc-root [class*="Panel"],
      #nc-root [class*="panel"] {
        background: var(--bg2) !important;
        border-color: var(--bd) !important;
      }
      /* Big layout wrappers: keep them transparent so they don't paint
         a gray slab on top of the page background */
      #nc-root [class*="Pane"],
      #nc-root [class*="pane"],
      #nc-root [class*="Wrapper"],
      #nc-root [class*="Container"],
      #nc-root [class*="Sidebar"] {
        background: transparent !important;
        border-color: var(--bd) !important;
      }
      #nc-root [class*="Card"]:hover,
      #nc-root [class*="ListCard"]:hover {
        border-color: var(--bd2) !important;
      }

      /* ── Inputs ── */
      #nc-root input:not([type=checkbox]):not([type=radio]):not([type=range]),
      #nc-root textarea,
      #nc-root select {
        background: var(--bg2) !important;
        border: 1px solid var(--bd) !important;
        color: var(--tx) !important;
        border-radius: 6px !important;
        font-family: var(--sans) !important;
        font-size: 15px !important;
        transition: border-color 0.15s !important;
      }
      #nc-root input:focus,
      #nc-root textarea:focus,
      #nc-root select:focus {
        border-color: var(--ac) !important;
        box-shadow: 0 0 0 3px var(--ac-dim) !important;
        outline: none !important;
      }
      #nc-root input::placeholder,
      #nc-root textarea::placeholder { color: var(--tx2) !important; }

      /* ── The writing surface ─────────────────────────────
         Title input + markdown body: bigger type, more air.   */
      #nc-root input[id*="title"],
      #nc-root input[placeholder*="itel"] {
        font-size: 28px !important;
        font-weight: 600 !important;
        letter-spacing: -0.02em !important;
        background: transparent !important;
        border: none !important;
        box-shadow: none !important;
        padding-left: 0 !important;
      }
      /* Rich-text editor body (Slate) */
      #nc-root [data-slate-editor],
      #nc-root [data-slate-editor] p,
      #nc-root [data-slate-editor] span:not([class*="code"]) {
        font-size: 16.5px !important;
        line-height: 1.7 !important;
        color: var(--tx) !important;
      }
      #nc-root [data-slate-editor] { padding: 24px 32px 140px !important; caret-color: var(--ac); }
      /* Raw markdown mode */
      #nc-root [class*="RawEditor"] textarea,
      #nc-root [class*="RawEditor"] .CodeMirror,
      #nc-root .CodeMirror {
        background: var(--bg0) !important;
        color: var(--tx) !important;
        font-family: var(--mono) !important;
        font-size: 14px !important;
        line-height: 1.7 !important;
        border: none !important;
      }
      #nc-root .CodeMirror-lines { padding: 24px 28px !important; }
      #nc-root .CodeMirror-cursor { border-left-color: var(--ac) !important; }
      #nc-root .CodeMirror-gutters { background: var(--bg0) !important; border-right: 1px solid var(--bd) !important; }
      #nc-root .CodeMirror-linenumber { color: var(--tx2) !important; }
      #nc-root .CodeMirror-selected { background: var(--ac-dim) !important; }

      /* ── Editor page: kill every white surface ── */
      #nc-root [class*="EditorContainer"],
      #nc-root [class*="ControlPane"],
      #nc-root [class*="EditorControlPane"],
      #nc-root [class*="PreviewPane"],
      #nc-root [class*="Markdown"],
      #nc-root [class*="RichText"],
      #nc-root [class*="VisualEditor"],
      #nc-root [class*="Editor"] section,
      #nc-root [class*="ControlPane"] > div {
        background: var(--bg0) !important;
        border-color: var(--bd) !important;
      }
      /* Slate editor and everything inside: transparent over dark */
      #nc-root [data-slate-editor],
      #nc-root [data-slate-editor] div,
      #nc-root [data-slate-editor] p,
      #nc-root [data-slate-editor] span {
        background-color: transparent !important;
      }
      /* Widget rows inside the control pane */
      #nc-root [class*="EditorControl"] > div {
        background: transparent !important;
      }

      /* ── Buttons ── */
      #nc-root button {
        background: var(--bg2) !important;
        border: 1px solid var(--bd) !important;
        color: var(--tx) !important;
        border-radius: 6px !important;
        font-family: var(--sans) !important;
        font-weight: 500 !important;
        cursor: pointer !important;
        transition: border-color 0.15s, background 0.15s !important;
      }
      #nc-root button:hover {
        border-color: var(--bd2) !important;
      }
      /* Publish / primary: white on black — the one strong element */
      #nc-root button[class*="primary"],
      #nc-root button[class*="success"],
      #nc-root button[class*="Publish"],
      #nc-root button[class*="publish"] {
        background: var(--tx) !important;
        border-color: var(--tx) !important;
        color: var(--bg0) !important;
      }
      #nc-root button[class*="Publish"]:hover,
      #nc-root button[class*="publish"]:hover {
        background: #ffffff !important;
      }
      #nc-root button[class*="Publish"] span,
      #nc-root button[class*="publish"] span {
        color: var(--bg0) !important;
      }
      /* Delete / danger */
      #nc-root button[class*="Delete"],
      #nc-root button[class*="delete"],
      #nc-root button[class*="danger"] {
        background: transparent !important;
        border-color: var(--bd) !important;
        color: var(--re) !important;
      }

      /* ── Markdown toolbar: quiet icon strip ── */
      #nc-root [class*="Toolbar"],
      #nc-root [class*="toolbar"],
      #nc-root [class*="EditorControl"],
      #nc-root [class*="RawEditor"] {
        background: var(--bg1) !important;
        border-color: var(--bd) !important;
        color: var(--tx) !important;
      }
      #nc-root [class*="Toolbar"] button,
      #nc-root [class*="toolbar"] button {
        background: transparent !important;
        border: none !important;
        color: var(--tx2) !important;
      }
      #nc-root [class*="Toolbar"] button:hover,
      #nc-root [class*="toolbar"] button:hover {
        background: var(--bg2) !important;
        color: var(--tx) !important;
      }

      /* ── Labels: small, quiet, uppercase ── */
      #nc-root label {
        color: var(--tx2) !important;
        font-size: 11px !important;
        font-weight: 600 !important;
        text-transform: uppercase !important;
        letter-spacing: 0.07em !important;
      }

      /* ── Dropdowns / menus / dialogs ── */
      #nc-root [role=listbox],
      #nc-root [role=menu],
      #nc-root [role=dialog],
      #nc-root [role=tooltip] {
        background: var(--bg1) !important;
        border: 1px solid var(--bd) !important;
        border-radius: 8px !important;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6) !important;
        color: var(--tx) !important;
      }
      #nc-root [role=option]:hover,
      #nc-root [role=menuitem]:hover {
        background: var(--bg2) !important;
      }

      /* ── Code ── */
      #nc-root code,
      #nc-root pre {
        background: var(--bg2) !important;
        color: var(--tx) !important;
        font-family: var(--mono) !important;
        font-size: 13px !important;
        border-radius: 4px !important;
        border-color: var(--bd) !important;
      }

      /* ── Tables ── */
      #nc-root table { border-collapse: collapse !important; }
      #nc-root th { background: var(--bg2) !important; color: var(--tx2) !important; }
      #nc-root td, #nc-root th { border-color: var(--bd) !important; }
      #nc-root tr:hover > td { background: var(--bg2) !important; }

      /* ── Misc ── */
      #nc-root hr { border-color: var(--bd) !important; }
      #nc-root input[type=checkbox] { accent-color: var(--ac); }
      #nc-root [class*="Toast"],
      #nc-root [class*="toast"],
      #nc-root [class*="notification"],
      #nc-root [class*="Notification"] {
        background: var(--bg1) !important;
        border: 1px solid var(--bd) !important;
        color: var(--tx) !important;
        border-radius: 8px !important;
      }

      /* ── Login page ── */
      #nc-root [class*="AuthenticationPage"],
      #nc-root [class*="Authentication"] {
        background: var(--bg0) !important;
      }
      #nc-root [class*="Authentication"] button {
        background: var(--tx) !important;
        border: 1px solid var(--tx) !important;
        color: var(--bg0) !important;
        padding: 12px 24px !important;
      }
      #nc-root [class*="Authentication"] button:hover {
        background: #ffffff !important;
      }
      #nc-root [class*="Authentication"] button span {
        color: var(--bg0) !important;
      }

      /* ── Scrollbars ── */
      * { scrollbar-width: thin; scrollbar-color: var(--bd) transparent; }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--tx2); }

      /* ── Flatten shadows everywhere, re-add only where depth matters ── */
      #nc-root * { box-shadow: none !important; }
      /* Pseudo-element decorations (stray light lines) — the JS observer
         below can't reach these, only CSS can */
      #nc-root *::before,
      #nc-root *::after {
        background-color: transparent !important;
        background-image: none !important;
        box-shadow: none !important;
      }
      #nc-root [role=dialog],
      #nc-root [role=listbox],
      #nc-root [role=menu] {
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.6) !important;
      }
      #nc-root input:focus,
      #nc-root textarea:focus,
      #nc-root select:focus {
        box-shadow: 0 0 0 3px var(--ac-dim) !important;
      }
    </style>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@3.3.3/dist/decap-cms.js"></script>
    <script>
      /* Decap ships a light-only theme with hashed class names, so static CSS
         cannot reach every surface. Watch the DOM and darken anything that
         still renders light. Idempotent: once a surface is dark it is skipped. */
      (function () {
        var SKIP = { IMG: 1, VIDEO: 1, IFRAME: 1, CANVAS: 1, svg: 1, path: 1, circle: 1, rect: 1, line: 1, polygon: 1, g: 1, use: 1 };

        function parse(str) {
          var m = /rgba?\((\d+)[,\s]+(\d+)[,\s]+(\d+)(?:[,\s/]+([\d.]+))?\)/.exec(str);
          return m ? { r: +m[1], g: +m[2], b: +m[3], a: m[4] === undefined ? 1 : +m[4] } : null;
        }
        function lum(c) { return 0.2126 * c.r + 0.7152 * c.g + 0.0722 * c.b; }

        function fix(el) {
          if (SKIP[el.tagName]) return;
          var cs = getComputedStyle(el);

          var bg = parse(cs.backgroundColor);
          if (bg && bg.a >= 0.15 && lum(bg) > 160) {
            /* big areas blend into the page; small surfaces get card tone */
            var r = el.getBoundingClientRect();
            var big = r.width * r.height > window.innerWidth * window.innerHeight * 0.35;
            el.style.setProperty('background-color', big ? '#0a0a0a' : (lum(bg) > 235 ? '#151515' : '#0f0f0f'), 'important');
          }

          var bi = cs.backgroundImage;
          if (bi !== 'none' && bi.indexOf('gradient') !== -1 && bi.indexOf('url(') === -1) {
            el.style.setProperty('background-image', 'none', 'important');
          }

          var col = parse(cs.color);
          if (col && lum(col) < 90) {
            el.style.setProperty('color', '#ededed', 'important');
          }

          var sides = ['Top', 'Right', 'Bottom', 'Left'];
          for (var s = 0; s < sides.length; s++) {
            if (cs['border' + sides[s] + 'Width'] !== '0px') {
              var bc = parse(cs['border' + sides[s] + 'Color']);
              if (bc && lum(bc) > 150) {
                el.style.setProperty('border-' + sides[s].toLowerCase() + '-color', '#262626', 'important');
              }
            }
          }

          if (cs.outlineWidth !== '0px' && cs.outlineStyle !== 'none') {
            var oc = parse(cs.outlineColor);
            if (oc && lum(oc) > 150) {
              el.style.setProperty('outline-color', '#262626', 'important');
            }
          }
        }

        function walk() {
          var all = document.body.querySelectorAll('*');
          for (var i = 0; i < all.length; i++) fix(all[i]);
        }

        var pending = false;
        function schedule() {
          if (pending) return;
          pending = true;
          requestAnimationFrame(function () {
            pending = false;
            walk();
          });
        }

        new MutationObserver(schedule).observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['class', 'style']
        });
        schedule();
      })();
    </script>
    <script>
      /* The live preview renders inside an iframe — page CSS can't reach it.
         Styles for it must be registered through the CMS API. */
      CMS.registerPreviewStyle(
        [
          "@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');",
          "body { background: #0a0a0a; color: #d6d6d6; font-family: 'Inter', system-ui, sans-serif; font-size: 16px; line-height: 1.7; padding: 32px 40px; margin: 0; }",
          "h1, h2, h3, h4, h5, h6 { color: #f0f0f0; font-weight: 600; letter-spacing: -0.015em; line-height: 1.3; }",
          "h1 { font-size: 26px; } h2 { font-size: 20px; border-bottom: 1px solid #2a2a2a; padding-bottom: 6px; } h3 { font-size: 17px; }",
          "a { color: #4a9eff; text-decoration: none; }",
          "strong { color: #f0f0f0; }",
          "code { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 4px; padding: 2px 6px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #d6d6d6; }",
          "pre { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 6px; padding: 16px 18px; overflow-x: auto; line-height: 1.65; }",
          "pre code { background: none; border: none; padding: 0; }",
          "blockquote { border-left: 3px solid #2a2a2a; margin: 1.4em 0; padding: 8px 18px; color: #888888; }",
          "img { max-width: 100%; border: 1px solid #2a2a2a; border-radius: 4px; }",
          "table { width: 100%; border-collapse: collapse; font-size: 14px; }",
          "th, td { padding: 8px 12px; border-bottom: 1px solid #2a2a2a; text-align: left; }",
          "hr { border: none; border-top: 1px solid #2a2a2a; }",
          "ul, ol { padding-left: 1.4em; } li { margin-bottom: 0.3em; }"
        ].join('\n'),
        { raw: true }
      );
    </script>
  </body>
</html>
