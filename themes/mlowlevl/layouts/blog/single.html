{{ define "main" }}
<div class="md-reader">
  <a class="back" href="/blog/">← back</a>
  <div class="md-reader-header">
    <div class="md-reader-title">{{ .Title }}</div>
    <div class="md-reader-meta">
      <span class="md-reader-byline">{{ site.Title }}{{ if .Date }} · {{ .Date.Format "2006-01-02" }}{{ end }} · {{ .ReadingTime }} min read</span>
    </div>
  </div>
  <div class="md">{{ .Content }}</div>
  {{ partial "giscus.html" . }}
</div>
{{ end }}

{{ define "sidebar" }}
<aside class="extra-paper">
  {{ partial "sidebar.html" . }}
</aside>
{{ end }}
