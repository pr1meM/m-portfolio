{{- $section := .Section -}}
{{- if .IsHome -}}{{- $section = "home" -}}{{- end -}}
<div class="nav" id="main-nav">
  <div class="logo-wrap">
    <div class="logo-row">
      <a class="logo" href="/">{{ site.Title }}</a>
      <div class="socials">
        {{ with site.Params.github }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="GitHub">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        </a>{{ end }}
        {{ with site.Params.threads }}<a href="{{ . }}" target="_blank" rel="noopener" aria-label="Threads">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>
        </a>{{ end }}
      </div>
    </div>
    <div class="tagline">{{ site.Params.tagline }}</div>
  </div>
  <button class="hamburger" onclick="toggleMobileMenu()" aria-label="menu">
    <span></span><span></span><span></span>
  </button>
  <nav class="nav-buttons">
    <a class="nav-btn{{ if eq $section "home" }} active-tab{{ end }}" href="/">home</a>
    <span class="sep">|</span>
    <div class="dropdown" id="wr-dropdown">
      <button class="nav-btn{{ if eq $section "writeups" }} active-tab{{ end }}" onclick="toggleDropdown(event)">
        writeups <span class="chevron"></span>
      </button>
      <div class="dropdown-panel">
        <a class="dropdown-item{{ if and (eq $section "writeups") (eq .Kind "section") (eq .Title "Writeups") }} active{{ end }}" href="/writeups/">all</a>
        <a class="dropdown-item" href="/writeups/pwn/">pwn</a>
        <a class="dropdown-item" href="/writeups/osint/">osint</a>
        <a class="dropdown-item" href="/writeups/malware-analysis/">malware-analysis</a>
      </div>
    </div>
    <span class="sep">|</span>
    <a class="nav-btn{{ if eq $section "blog" }} active-tab{{ end }}" href="/blog/">blog</a>
    <span class="sep">|</span>
    <a class="nav-btn{{ if eq $section "tools" }} active-tab{{ end }}" href="/tools/">tools</a>
    <span class="sep">|</span>
    <a class="nav-btn{{ if eq $section "links" }} active-tab{{ end }}" href="/links/">links</a>
  </nav>
</div>
